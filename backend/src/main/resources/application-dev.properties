spring.application.name=fab-legis

# Tomcat
server.port=8081

# Swagger
springdoc.api-docs.path=/v1/fab-legis-api
#springdoc.swagger-ui.tagsSorter=method
#springdoc.swagger-ui.tags-sorter=method
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.default-models-expand-depth=-1

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://172.18.0.2:5432/fab-legis-dev
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# MongoDB
#spring.data.mongodb.uri=mongodb://localhost:27017/fab-legisDB
#spring.data.mongodb.auto-index-creation=true
#spring.data.mongodb.database=fab-legisDB

# SpringDataJPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.show_sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# FlyWay
#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.locations=classpath:db/migration

# Docker Compose
#spring.docker.compose.enabled=true
spring.docker.compose.file=docker-compose.yml

# CORS
cors.allowed.origins=http://localhost:4200,http://localhost:3000,**

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Open session in View
#spring.jpa.open-in-view=true