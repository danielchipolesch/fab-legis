services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: fab-legis-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    restart: always

  frontend-prod:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    container_name: fab-legis-frontend-prod
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    profiles:
      - production
    restart: unless-stopped
