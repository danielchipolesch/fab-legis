services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fab-legis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: fab-legis-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fab-legis-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fab-legis-dev
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123456"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend — desenvolvimento (Vite + HMR) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: fab-legis-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      NODE_ENV: development
      VITE_USE_MOCK_API: "false"
      VITE_API_BASE_URL: "http://localhost:8081/v1"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Frontend — produção (Nginx, perfil production) ──────────────────────────
  frontend-prod:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    container_name: fab-legis-frontend-prod
    ports:
      - "80:8080"
    environment:
      NODE_ENV: production
    profiles:
      - production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
